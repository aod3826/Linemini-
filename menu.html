<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#06C755">
  <title>เมนูอาหาร</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    .btn-add-cart.hidden { display: none; }
    .hidden { display: none; }
    #order-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      background: white;
      border-top: 1px solid var(--color-gray-100);
      box-shadow: 0 -4px 16px rgba(0,0,0,0.1);
      z-index: 100;
      display: none;
    }
    #order-bar.show { display: block; }
    .bar-inner {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      border-radius: var(--radius-full);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      color: white;
      cursor: pointer;
    }
    .bar-left { display: flex; align-items: center; gap: 10px; }
    .bar-count-badge {
      background: rgba(255,255,255,0.25);
      border-radius: var(--radius-full);
      padding: 3px 10px;
      font-size: 13px; font-weight: 700;
    }
    .bar-label { font-size: 15px; font-weight: 700; }
    .bar-total { font-size: 16px; font-weight: 800; }
  </style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <a href="index.html" class="header-back">←</a>
  <span class="header-title">เมนูอาหาร</span>
  <a href="cart.html" class="header-action">
    🛒
    <span class="cart-badge" id="cart-badge"></span>
  </a>
</header>

<!-- Category Tabs -->
<div class="category-tabs" id="category-tabs">
  <button class="tab-btn active">ทั้งหมด</button>
</div>

<!-- Menu Grid -->
<main style="padding: 12px 16px 120px;">
  <div class="menu-grid" id="menu-grid">
    <!-- Populated by menu.js -->
  </div>
</main>

<!-- Fixed Order Bar -->
<div id="order-bar">
  <div class="bar-inner" onclick="window.location.href='cart.html'">
    <div class="bar-left">
      <span class="bar-count-badge bar-count">0 รายการ</span>
      <span class="bar-label">ดูตะกร้า</span>
    </div>
    <span class="bar-total">฿0</span>
  </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item" data-page="index.html">
    <span class="nav-icon">🏠</span>
    <span>หน้าหลัก</span>
  </a>
  <a href="menu.html" class="nav-item active" data-page="menu.html">
    <span class="nav-icon">🍽️</span>
    <span>เมนู</span>
  </a>
  <a href="cart.html" class="nav-item" data-page="cart.html">
    <span class="nav-icon">🛒</span>
    <span>ตะกร้า</span>
    <span class="nav-cart-badge" id="nav-cart-badge"></span>
  </a>
  <a href="order-status.html" class="nav-item" data-page="order-status.html">
    <span class="nav-icon">📋</span>
    <span>ออเดอร์</span>
  </a>
</nav>

<script src="js/cart.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/menu.js"></script>
</body>
</html>
