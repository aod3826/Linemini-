<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#06C755">
  <title>ตะกร้าสินค้า</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <a href="menu.html" class="header-back">←</a>
  <span class="header-title">ตะกร้าสินค้า</span>
  <button onclick="CartPage.clearAll()" style="font-size:13px; color:var(--color-danger); padding:6px 8px;">
    ล้างทั้งหมด
  </button>
</header>

<main class="page" id="cart-main">
  <!-- Populated by script -->
</main>

<!-- Order Summary Bar -->
<div class="order-summary-bar" id="summary-bar">
  <div class="summary-row">
    <span class="summary-total-label">ยอดรวม (<span id="total-count">0</span> รายการ)</span>
    <span class="summary-total" id="total-price">฿0</span>
  </div>
  <button class="btn btn-primary mt-8" onclick="CartPage.checkout()">
    ไปชำระเงิน →
  </button>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item" data-page="index.html">
    <span class="nav-icon">🏠</span>
    <span>หน้าหลัก</span>
  </a>
  <a href="menu.html" class="nav-item" data-page="menu.html">
    <span class="nav-icon">🍽️</span>
    <span>เมนู</span>
  </a>
  <a href="cart.html" class="nav-item active" data-page="cart.html">
    <span class="nav-icon">🛒</span>
    <span>ตะกร้า</span>
    <span class="nav-cart-badge show" id="nav-cart-badge"></span>
  </a>
  <a href="order-status.html" class="nav-item" data-page="order-status.html">
    <span class="nav-icon">📋</span>
    <span>ออเดอร์</span>
  </a>
</nav>

<script src="js/cart.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
const CartPage = (() => {

  function render() {
    const main = document.getElementById('cart-main');
    const items = Cart.getItems();

    if (items.length === 0) {
      main.innerHTML = `
        <div class="cart-empty">
          <div class="cart-empty-icon">🛒</div>
          <div class="cart-empty-title">ตะกร้าว่างเปล่า</div>
          <div class="cart-empty-text">เลือกเมนูที่คุณชอบได้เลย</div>
          <a href="menu.html" class="btn btn-primary mt-16" style="display:inline-flex; max-width:200px;">
            ไปเลือกเมนู
          </a>
        </div>
      `;
      document.getElementById('summary-bar').classList.remove('show');
      return;
    }

    main.innerHTML = `
      <div class="cart-list" style="margin-bottom: 120px;">
        ${items.map(item => `
          <div class="cart-item" id="cart-item-${item.menuId}">
            ${item.imageUrl
              ? `<img class="cart-item-img" src="${item.imageUrl}" alt="${item.name}" onerror="this.src=''; this.style.display='none'">`
              : `<div class="cart-item-img" style="background:var(--color-gray-100); display:flex; align-items:center; justify-content:center; font-size:28px;">🍽️</div>`
            }
            <div class="cart-item-info">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">${formatPrice(item.price)} / ชิ้น</div>
            </div>
            <div class="cart-item-controls">
              <button class="btn-qty btn-qty-minus ${item.qty === 1 ? 'danger' : ''}"
                onclick="CartPage.decrease('${item.menuId}')">
                ${item.qty === 1 ? '🗑️' : '−'}
              </button>
              <span class="cart-item-qty">${item.qty}</span>
              <button class="btn-qty btn-qty-plus"
                onclick="CartPage.increase('${item.menuId}')">+</button>
            </div>
          </div>
        `).join('')}

        <!-- Note section -->
        <div style="padding: 16px; background: white; margin-top: 8px;">
          <div style="font-weight:700; font-size:14px; margin-bottom:8px; color: var(--color-gray-700);">
            📝 หมายเหตุถึงร้าน
          </div>
          <textarea id="order-note" rows="3" placeholder="เช่น ไม่ใส่ผัก, เผ็ดน้อย..." style="
            width:100%; border: 1.5px solid var(--color-gray-200, #E5E7EB);
            border-radius: 12px; padding: 10px 12px;
            font-family: var(--font-main); font-size:14px;
            resize:none; outline:none; color: var(--color-gray-900);
          "></textarea>
        </div>
      </div>
    `;

    updateSummary();
  }

  function updateSummary() {
    const bar = document.getElementById('summary-bar');
    const count = Cart.getCount();
    const total = Cart.getTotal();

    if (count === 0) {
      bar.classList.remove('show');
      return;
    }

    bar.classList.add('show');
    document.getElementById('total-count').textContent = count;
    document.getElementById('total-price').textContent = formatPrice(total);
  }

  function increase(menuId) {
    const items = Cart.getItems();
    const item = items.find(i => i.menuId === menuId);
    if (item) Cart.addItem({ id: item.menuId, name: item.name, price: item.price, image_url: item.imageUrl });
    render();
  }

  function decrease(menuId) {
    Cart.removeItem(menuId);
    render();
  }

  function clearAll() {
    if (!Cart.isEmpty() && confirm('ล้างตะกร้าทั้งหมด?')) {
      Cart.clear();
      render();
    }
  }

  function checkout() {
    if (Cart.isEmpty()) return;
    window.location.href = 'checkout.html';
  }

  // Initialize
  document.addEventListener('DOMContentLoaded', () => {
    render();
    updateCartBadges();
  });

  return { increase, decrease, clearAll, checkout };
})();
</script>
</body>
</html>
