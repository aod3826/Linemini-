<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จอครัว - Kitchen Display</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #0F1117; max-width: 100%; }
    .kitchen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px; padding: 16px;
    }

    /* ===== AUTO-LOGIN STATUS ===== */
    #login-status {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; background: #1A3A2E;
      color: #FFFFFF; padding: 12px 16px; text-align: center;
      font-size: 13px; z-index: 300; border-bottom: 1px solid rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .login-spinner { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #FFFFFF; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #login-status.success { background: #047857; }
    #login-status.error { background: #DC2626; }

    .kitchen-filter {
      display: flex; gap: 8px; padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      align-items: center;
      margin-top: 44px;
    }
    .kfilter-btn {
      padding: 6px 16px; border-radius: 999px;
      font-family: var(--font-main); font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1.5px solid rgba(255,255,255,0.2);
      background: transparent; color: rgba(255,255,255,0.6); transition: all 0.2s;
    }
    .kfilter-btn.active { background: var(--color-primary); border-color: var(--color-primary); color: white; }

    .sound-toggle {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
    }
    .sound-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: transparent; color: white;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .sound-btn.on  { background: var(--color-primary); border-color: var(--color-primary); }
    .sound-btn.off { background: rgba(239,68,68,0.3); border-color: #EF4444; }

    .kitchen-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px; background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      margin-top: 44px;
    }
    .kitchen-title { font-size: 20px; font-weight: 800; color: white; }
    .kitchen-subtitle { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .kitchen-clock { font-size: 18px; font-weight: 700; color: #06C755; font-family: monospace; }

    .kitchen-card {
      background: #1A1D2B; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; overflow: hidden; transition: all 0.2s;
    }
    .kitchen-card.urgent { border-color: #EF4444; box-shadow: 0 0 12px rgba(239,68,68,0.3); }
    .kitchen-card.new-order { animation: newOrderFlash 0.5s ease-out, newOrderFlash 1s ease-in-out 3; }
    @keyframes newOrderFlash {
      0%,100% { background: #1A1D2B; }
      50%      { background: rgba(6,199,85,0.15); }
    }

    .kitchen-card-header {
      padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .kitchen-order-id { font-weight: 800; font-size: 15px; color: white; }
    .kitchen-order-time { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .status-badge { font-size: 11px; font-weight: 700; padding: 4px 8px;
      border-radius: 6px; white-space: nowrap; }
    .badge-paid { background: rgba(59,130,246,0.2); color: #60A5FA; }
    .badge-cooking { background: rgba(255,107,53,0.2); color: #FB923C; }

    .kitchen-card-body { padding: 12px 14px; }
    .kitchen-item { display: flex; gap: 10px; margin-bottom: 8px; }
    .kitchen-item-qty {
      background: #06C755; color: white; width: 28px; height: 28px;
      border-radius: 6px; display: flex; align-items: center;
      justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0;
    }
    .kitchen-item-name { font-size: 13px; color: white; flex: 1; }
    .kitchen-card-footer { padding: 12px 14px; display: flex; gap: 8px; }
    .btn-action { flex: 1; padding: 10px; border: none;
      border-radius: 8px; font-family: var(--font-main);
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s; }
    .btn-action:active { opacity: 0.8; }
    .btn-start { background: rgba(255,107,53,0.8); color: white; }
    .btn-done { background: rgba(6,199,85,0.8); color: white; }

    .kitchen-empty {
      grid-column: 1/-1; text-align: center; padding: 80px 20px;
      color: rgba(255,255,255,0.4);
    }
    .kitchen-empty-icon { font-size: 48px; margin-bottom: 12px; }
    .kitchen-empty-text { font-size: 15px; }

    main { padding-bottom: 20px; padding-top: 8px; }
  </style>
</head>
<body class="kitchen-page">

<!-- Auto-login Status -->
<div id="login-status">
  <div class="login-spinner"></div>
  <span id="status-text">กำลังเข้าสู่ระบบ...</span>
</div>

<!-- Kitchen UI -->
<div id="kitchen-ui" style="display:none;">
  <div class="kitchen-header">
    <div>
      <div class="kitchen-title">👨‍🍳 จอครัว</div>
      <div class="kitchen-subtitle" id="order-count">กำลังโหลด...</div>
    </div>
    <div class="kitchen-clock" id="kitchen-clock">00:00</div>
  </div>

  <div class="kitchen-filter">
    <button class="kfilter-btn active" onclick="KitchenDisplay.setFilter('active', this)">🔥 กำลังทำ</button>
    <button class="kfilter-btn" onclick="KitchenDisplay.setFilter('paid', this)">✅ ชำระแล้ว</button>
    <button class="kfilter-btn" onclick="KitchenDisplay.setFilter('all', this)">📋 ทั้งหมด</button>
    <button class="kfilter-btn" onclick="KitchenDisplay.refresh()">🔄</button>
    <div class="sound-toggle">
      <button class="sound-btn on" id="sound-btn" onclick="KitchenDisplay.toggleSound()" title="เสียงแจ้งเตือน">
        🔔
      </button>
    </div>
  </div>

  <main class="kitchen-grid" id="kitchen-grid">
    <div class="kitchen-empty">
      <div class="kitchen-empty-icon">✨</div>
      <div class="kitchen-empty-text">ยังไม่มีออเดอร์</div>
    </div>
  </main>
</div>

<script src="js/cart.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
const KitchenDisplay = (() => {
  const ADMIN_KEY = 'aod12345'; // ต้องตรงกับ CONFIG.ADMIN_KEY ใน backend
  
  let allOrders = [];
  let currentFilter = 'active';
  let refreshTimer = null;
  let soundEnabled = true;
  let knownOrderIds = new Set();
  let audioCtx = null;
  let isFirstLoad = true;
  let isLoginComplete = false;

  // ===== AUTO-LOGIN =====
  async function autoLogin() {
    const statusEl = document.getElementById('login-status');
    const statusText = document.getElementById('status-text');

    try {
      statusText.textContent = 'เชื่อมต่อระบบ...';
      
      // ตรวจสอบ admin key
      const result = await API.getSalesReport(ADMIN_KEY);
      
      if (!result.success) throw new Error('ไม่สามารถเข้าถึง');

      statusEl.classList.add('success');
      statusText.textContent = '✅ เข้าสู่ระบบแล้ว!';
      isLoginComplete = true;

      // ซ่อน login status หลังจาก 1 วินาที
      setTimeout(() => {
        statusEl.style.display = 'none';
        document.getElementById('kitchen-ui').style.display = 'block';
        startClock();
        loadOrders();
        refreshTimer = setInterval(loadOrders, 20000);
      }, 1000);

    } catch (err) {
      statusEl.classList.add('error');
      statusText.textContent = '❌ เข้าสู่ระบบไม่สำเร็จ';
      console.error('Auto-login error:', err);
      
      setTimeout(() => {
        location.reload();
      }, 3000);
    }
  }

  // ===== SOUND ENGINE =====
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound(type) {
    if (!soundEnabled) return;
    try {
      const ctx = getAudioCtx();

      if (type === 'newOrder') {
        [0, 0.25, 0.5].forEach(delay => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 880;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0, ctx.currentTime + delay);
          gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + delay + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.3);
          osc.start(ctx.currentTime + delay);
          osc.stop(ctx.currentTime + delay + 0.3);
        });
      } else if (type === 'urgent') {
        [0, 0.2, 0.4, 0.6].forEach((delay, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = i % 2 === 0 ? 1000 : 700;
          osc.type = 'square';
          gain.gain.setValueAtTime(0, ctx.currentTime + delay);
          gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + delay + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.18);
          osc.start(ctx.currentTime + delay);
          osc.stop(ctx.currentTime + delay + 0.18);
        });
      } else if (type === 'done') {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.2);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.2);
      }
    } catch(e) {
      console.warn('Sound error:', e);
    }
  }

  function toggleSound() {
    soundEnabled = !soundEnabled;
    const btn = document.getElementById('sound-btn');
    btn.textContent = soundEnabled ? '🔔' : '🔕';
    btn.className = `sound-btn ${soundEnabled ? 'on' : 'off'}`;
    if (soundEnabled) playSound('newOrder');
  }

  // ===== CLOCK =====
  function startClock() {
    function tick() {
      const el = document.getElementById('kitchen-clock');
      if (el) el.textContent = new Date().toLocaleTimeString('th-TH', {
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      });
    }
    tick();
    setInterval(tick, 1000);
  }

  // ===== LOAD & RENDER =====
  async function loadOrders() {
    try {
      const result = await API.getOrders(ADMIN_KEY, '');
      const newOrders = result.orders || [];

      if (!isFirstLoad) {
        const newActiveOrders = newOrders.filter(o =>
          (o.status === 'paid' || o.status === 'cooking') &&
          !knownOrderIds.has(o.orderId)
        );
        
        if (newActiveOrders.length > 0) {
          playSound('newOrder');
          newActiveOrders.forEach(o => {
            setTimeout(() => {
              const card = document.getElementById('kcard-' + o.orderId);
              if (card) card.classList.add('new-order');
            }, 100);
          });
        }
      }

      const urgentOrders = newOrders.filter(o => {
        const ageMin = Math.floor((Date.now() - new Date(o.createdAt)) / 60000);
        return ageMin >= 15 && (o.status === 'paid' || o.status === 'cooking');
      });
      if (!isFirstLoad && urgentOrders.length > 0) {
        playSound('urgent');
      }

      newOrders.forEach(o => knownOrderIds.add(o.orderId));
      allOrders = newOrders;
      isFirstLoad = false;
      renderOrders();

    } catch (err) {
      console.error('Load orders error:', err);
    }
  }

  function renderOrders() {
    const grid = document.getElementById('kitchen-grid');
    const countEl = document.getElementById('order-count');

    let filtered;
    if (currentFilter === 'active') {
      filtered = allOrders.filter(o => o.status === 'cooking' || o.status === 'paid');
    } else if (currentFilter === 'paid') {
      filtered = allOrders.filter(o => o.status === 'paid');
    } else {
      filtered = allOrders.filter(o => o.status !== 'done');
    }

    filtered.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

    const cookingCount = allOrders.filter(o => o.status === 'cooking').length;
    const waitCount = allOrders.filter(o => o.status === 'paid').length;
    countEl.textContent = `🔥 กำลังทำ: ${cookingCount} · ⏳ รอทำ: ${waitCount}`;

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="kitchen-empty">
          <div class="kitchen-empty-icon">✨</div>
          <div class="kitchen-empty-text">ไม่มีออเดอร์ที่ต้องทำ</div>
        </div>
      `;
      return;
    }

    grid.innerHTML = filtered.map(order => {
      const ageMin = Math.floor((Date.now() - new Date(order.createdAt)) / 60000);
      const isUrgent = ageMin >= 15;
      return `
        <div class="kitchen-card ${isUrgent ? 'urgent' : ''}" id="kcard-${order.orderId}">
          <div class="kitchen-card-header">
            <div>
              <div class="kitchen-order-id">#${order.orderId}</div>
              <div class="kitchen-order-time">${order.customerName} · ${ageMin} นาที ${isUrgent ? '⚠️' : ''}</div>
            </div>
            <span class="status-badge ${order.status === 'cooking' ? 'badge-cooking' : 'badge-paid'}">
              ${order.status === 'cooking' ? '🔥 กำลังทำ' : '✅ ชำระแล้ว'}
            </span>
          </div>
          <div class="kitchen-card-body">
            ${(order.items || []).map(item => `
              <div class="kitchen-item">
                <div class="kitchen-item-qty">${item.quantity}</div>
                <div class="kitchen-item-name">${item.menuName}${item.optionsSummary ? `<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;">⚙️ ${item.optionsSummary}</div>` : ''}</div>
              </div>
            `).join('')}
            ${order.note ? `
              <div style="margin-top:10px; padding:8px; background:rgba(255,255,255,0.06); border-radius:8px; font-size:13px; color:rgba(255,255,255,0.7);">
                📝 ${order.note}
              </div>` : ''}
          </div>
          <div class="kitchen-card-footer">
            ${order.status === 'paid' ? `
              <button class="btn-action btn-start"
                onclick="KitchenDisplay.startCooking('${order.orderId}')">
                🔥 เริ่มทำ
              </button>` : ''}
            <button class="btn-action btn-done"
              onclick="KitchenDisplay.markDone('${order.orderId}')">
              ✅ เสร็จแล้ว
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  async function startCooking(orderId) {
    try {
      await API.updateOrderStatus(ADMIN_KEY, orderId, 'cooking');
      await loadOrders();
    } catch(err) {
      alert('เกิดข้อผิดพลาด: ' + err.message);
    }
  }

  async function markDone(orderId) {
    const card = document.getElementById('kcard-' + orderId);
    if (card) { card.style.opacity = '0.5'; card.style.transform = 'scale(0.96)'; }
    try {
      await API.updateOrderStatus(ADMIN_KEY, orderId, 'done');
      playSound('done');
      await loadOrders();
    } catch(err) {
      if (card) { card.style.opacity = '1'; card.style.transform = ''; }
      alert('เกิดข้อผิดพลาด: ' + err.message);
    }
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.kfilter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
  }

  function refresh() { loadOrders(); }

  document.addEventListener('DOMContentLoaded', () => {
    // Unlock AudioContext
    document.addEventListener('click', () => {
      if (!audioCtx) getAudioCtx();
    }, { once: true });
    
    // Start auto-login
    autoLogin();
  });

  return { setFilter, refresh, toggleSound, startCooking, markDone, loadOrders };
})();
</script>
</body>
</html>
